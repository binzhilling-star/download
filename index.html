    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet"/>
    <style>
        body { 
            background-color: #131313; 
            color: white; 
            overflow-x: hidden;
        }
        
        /* Subtle moving background gradient */
        .animate-bg {
            background: linear-gradient(-45deg, #131313, #1c1b1b, #2a080a, #131313);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating animation for the app logo */
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* Right to Left scrolling marquee */
        .animate-scroll {
            display: flex;
            width: 200%;
            animation: scroll 25s linear infinite;
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Left to Right scrolling marquee */
        .animate-scroll-reverse {
            display: flex;
            width: 200%;
            animation: scroll-reverse 25s linear infinite;
        }
        @keyframes scroll-reverse {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        /* Utility for white/black logos to be highly visible */
        .logo-bright {
            filter: brightness(0) invert(1);
            opacity: 0.9;
        }
        .logo-color {
            opacity: 0.9;
        }
        .logo-color:hover, .logo-bright:hover {
            opacity: 1;
            transform: scale(1.05);
            transition: all 0.3s ease;
        }
    </style>
</head>
